name: Shop
options:
  bundleIdPrefix: com.ryanstarfox
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Release
  groupSortPosition: top
  createIntermediateGroups: true
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "H6AYG25QVN"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_CFBundleDisplayName: "Shop !"
    GENERATE_INFOPLIST_FILE: YES

configs:
  Debug: debug
  Release: release

packages:
  ShopCore:
    path: Shared

targets:
  # iOS App
  Shop:
    type: application
    platform: iOS
    sources:
      - path: iOS/Shop
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanstarfox.shop
        INFOPLIST_FILE: iOS/Shop/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_LANGUAGE: en
        CODE_SIGN_ENTITLEMENTS: iOS/Shop/Shop.entitlements
      configs:
        Debug:
          ENABLE_USER_SCRIPT_SANDBOXING: false
        Release:
          ENABLE_USER_SCRIPT_SANDBOXING: false
    dependencies:
      - package: ShopCore
      - target: ShopWatch
        embed: true
        codeSign: false
      - target: ShopWidget
        embed: true
    entitlements:
      path: iOS/Shop/Shop.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ryanstarfox.shop
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []

  # watchOS App
  ShopWatch:
    type: application
    platform: watchOS
    sources:
      - path: watchOS/ShopWatch
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanstarfox.shop.watch
        INFOPLIST_FILE: watchOS/ShopWatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_LANGUAGE: en
        WK_COMPANION_APP_BUNDLE_IDENTIFIER: com.ryanstarfox.shop
      configs:
        Debug:
          ENABLE_USER_SCRIPT_SANDBOXING: false
        Release:
          ENABLE_USER_SCRIPT_SANDBOXING: false
    dependencies:
      - package: ShopCore

  # macOS App
  ShopMac:
    type: application
    platform: macOS
    sources:
      - path: macOS/ShopMac
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanstarfox.shop.mac
        INFOPLIST_FILE: macOS/ShopMac/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_LANGUAGE: en
        CODE_SIGN_ENTITLEMENTS: macOS/ShopMac/ShopMac.entitlements
      configs:
        Debug:
          ENABLE_USER_SCRIPT_SANDBOXING: false
        Release:
          ENABLE_USER_SCRIPT_SANDBOXING: false
    dependencies:
      - package: ShopCore
      - target: ShopMacWidget
        embed: true
    entitlements:
      path: macOS/ShopMac/ShopMac.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ryanstarfox.shop

  ShopWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets/Shared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanstarfox.shop.widget
        INFOPLIST_FILE: Widgets/iOS/Info.plist
        DEVELOPMENT_LANGUAGE: en
        CODE_SIGN_ENTITLEMENTS: Widgets/ShopWidget.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        # Debug dylib / previews break appex codesign ("__preview.dylib is not signed").
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_PREVIEWS: NO
      configs:
        Debug:
          ENABLE_USER_SCRIPT_SANDBOXING: false
        Release:
          ENABLE_USER_SCRIPT_SANDBOXING: false
    dependencies:
      - package: ShopCore
    entitlements:
      path: Widgets/ShopWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ryanstarfox.shop

  ShopMacWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Widgets/Shared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanstarfox.shop.mac.widget
        INFOPLIST_FILE: Widgets/macOS/Info.plist
        DEVELOPMENT_LANGUAGE: en
        CODE_SIGN_ENTITLEMENTS: Widgets/ShopMacWidget.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        # Debug dylib / previews break appex codesign ("__preview.dylib is not signed").
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_PREVIEWS: NO
      configs:
        Debug:
          ENABLE_USER_SCRIPT_SANDBOXING: false
        Release:
          ENABLE_USER_SCRIPT_SANDBOXING: false
    dependencies:
      - package: ShopCore
    entitlements:
      path: Widgets/ShopMacWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.ryanstarfox.shop

  # Shared Tests
  ShopCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Shared/Tests/ShopCoreTests
    dependencies:
      - package: ShopCore

schemes:
  Shop:
    build:
      targets:
        Shop: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ShopCoreTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ShopMac:
    build:
      targets:
        ShopMac: all
        ShopMacWidget: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ShopWatch:
    build:
      targets:
        ShopWatch: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  ShopWidget:
    build:
      targets:
        ShopWidget: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
