name: Shop
options:
  bundleIdPrefix: com.ryanstarfox
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Release
  groupSortPosition: top
  createIntermediateGroups: true
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_KEY_CFBundleDisplayName: "Shop !"
    GENERATE_INFOPLIST_FILE: YES

configs:
  Debug: debug
  Release: release

packages:
  ShopCore:
    path: Shared

targets:
  # iOS App
  Shop:
    type: application
    platform: iOS
    sources:
      - path: iOS/Shop
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanstarfox.shop
        INFOPLIST_FILE: iOS/Shop/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_LANGUAGE: en
      configs:
        Debug:
          ENABLE_USER_SCRIPT_SANDBOXING: false
        Release:
          ENABLE_USER_SCRIPT_SANDBOXING: false
    dependencies:
      - package: ShopCore
      - target: ShopWatch
        embed: true
        codeSign: false
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []

  # watchOS App
  ShopWatch:
    type: application
    platform: watchOS
    sources:
      - path: watchOS/ShopWatch
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanstarfox.shop.watch
        INFOPLIST_FILE: watchOS/ShopWatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_LANGUAGE: en
        WK_COMPANION_APP_BUNDLE_IDENTIFIER: com.ryanstarfox.shop
      configs:
        Debug:
          ENABLE_USER_SCRIPT_SANDBOXING: false
        Release:
          ENABLE_USER_SCRIPT_SANDBOXING: false
    dependencies:
      - package: ShopCore

  # macOS App
  ShopMac:
    type: application
    platform: macOS
    sources:
      - path: macOS/ShopMac
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanstarfox.shop.mac
        INFOPLIST_FILE: macOS/ShopMac/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_LANGUAGE: en
        CODE_SIGN_ENTITLEMENTS: ""
      configs:
        Debug:
          ENABLE_USER_SCRIPT_SANDBOXING: false
        Release:
          ENABLE_USER_SCRIPT_SANDBOXING: false
    dependencies:
      - package: ShopCore
    entitlements:
      path: macOS/ShopMac/ShopMac.entitlements

  # Shared Tests
  ShopCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Shared/Tests/ShopCoreTests
    dependencies:
      - package: ShopCore

schemes:
  Shop:
    build:
      targets:
        Shop: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ShopCoreTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
